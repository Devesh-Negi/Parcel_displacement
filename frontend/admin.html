<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script>
    if (localStorage.getItem("isAdminLoggedIn") !== "true") {
        window.location.href = "admin-login.html";
    }
    </script>
</head>
<body>

<div class="page-shell">
    <header class="topbar">
        <div>
            <p class="eyebrow">Admin Control Center</p>
            <h1>Parcel Delivery Admin</h1>
        </div>
        <button class="btn-danger" onclick="logout()">Logout</button>
    </header>

    <section class="stats-grid">
        <div class="stat-card">
            <span>Cities</span>
            <strong id="cityCount">0</strong>
        </div>
        <div class="stat-card">
            <span>Routes</span>
            <strong id="routeCount">0</strong>
        </div>
        <div class="stat-card">
            <span>Parcels</span>
            <strong id="parcelCount">0</strong>
        </div>
    </section>

    <main class="dashboard-grid">
        <section class="panel">
            <h3>Add City</h3>
            <div class="form-row">
                <input type="text" id="cityName" placeholder="City Name">
                <button onclick="addCity()">Add City</button>
            </div>
            <p id="adminResult"></p>
        </section>

        <section class="panel">
            <h3>Add Route</h3>
            <div class="form-row">
                <select id="routeSourceSelect"></select>
                <select id="routeDestinationSelect"></select>
                <input type="number" id="routeDistance" placeholder="Distance (km)">
                <button onclick="addRoute()">Add Route</button>
            </div>
        </section>

        <section class="panel wide">
            <h3>Manage Data</h3>
            <div class="button-group">
                <button onclick="seedDemoData()">Add Sample Data</button>
                <button onclick="cleanupRoutes()">Remove Duplicate Routes</button>
                <button onclick="loadAdminCities()">Show Cities</button>
                <button onclick="loadAdminRoutes()">Show Routes</button>
                <button onclick="loadAdminParcels()">Show Parcels</button>
            </div>
            <div id="adminTableBox"></div>
        </section>

        <section class="panel">
            <h3>Traffic Level</h3>
            <div class="form-row">
                <select id="trafficLevel">
                    <option value="1">Low Traffic</option>
                    <option value="2">Medium Traffic</option>
                    <option value="3">High Traffic</option>
                </select>
                <button onclick="setTraffic()">Set Traffic</button>
            </div>
        </section>

        <section class="panel">
            <h3>Dispatch Parcel</h3>
            <div class="form-row">
                <input type="text" id="dispatchId" placeholder="Tracking Number">
                <button onclick="dispatchParcel()">Dispatch</button>
            </div>
        </section>

        <section class="panel">
            <h3>Update Parcel Status</h3>
            <div class="form-row">
                <input type="text" id="statusTrackingId" placeholder="Tracking Number">
                <select id="parcelStatus">
                    <option value="pending">Pending</option>
                    <option value="dispatched">Dispatched</option>
                    <option value="delivered">Delivered</option>
                </select>
                <button onclick="updateParcelStatus()">Update Status</button>
            </div>
        </section>

        <section class="panel">
            <h3>Auto Dispatch</h3>
            <button onclick="autoDispatch()">Dispatch Highest Priority</button>
            <p id="dispatchResult"></p>
        </section>

        <section class="panel wide">
            <h3>Analytics Dashboard</h3>
            <button onclick="loadAnalytics()">Load Analytics</button>
            <div id="analyticsBox"></div>
        </section>
    </main>
</div>

<script src="script.js"></script>

</body>
</html>
